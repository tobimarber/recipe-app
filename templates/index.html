<!DOCTYPE html>
<html>
<head>
    <title>Recipe Translator</title>
</head>
<body>

    <h1>🍲 Recipe Translator</h1>

    <form method="POST">
        <textarea name="recipe" rows="5" cols="50" placeholder="Enter recipe in any language"></textarea><br><br>
        <button type="submit">Add Recipe</button>
    </form>

    <hr>

    <h2>Recipes</h2>

    {% for r in recipes %}
        <div style="margin-bottom:20px;">
            <strong>Original:</strong>
            <p>{{ r.original }}</p>

            <strong>English:</strong>
            <p>{{ r.translated }}</p>
        </div>
    {% endfor %}

</body>
</html>
